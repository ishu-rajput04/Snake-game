<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <section>
        <div class="infos">
          <div class="info">
            <h3>Highest Score : <span id="highest-score">00</span></h3>
          </div>
          <div class="info">
            <h3>Score : <span id="score">00</span></h3>
          </div>
          <div class="info">
            <h3>Time : <span id="times">00:00</span></h3>
          </div>
        </div>

        <div class="board"></div>
      </section>
      <div class="modal">
        <div class="start-game">
          <h3>Welcome to the Snake game.</h3>
          <button class="btn btn-start">Start Game</button>
        </div>
        <div class="game-over">
          <h3>Game over</h3>
          <button class="btn btn-restart">Restart Game</button>
        </div>
      </div>
    </div>
    <!-- <script src="script.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.0/dist/confetti.browser.min.js"></script>
    <script src="script1.js"></script>
  </body>
</html>
